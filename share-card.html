<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Share Card — gerador OG image</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /*
      INSTRUÇÕES:
      1. Abra este arquivo no navegador: http://localhost:8080/share-card.html
      2. Tire um screenshot do card abaixo (1200x630)
         — Chrome DevTools: F12 → Ctrl+Shift+P → "Capture node screenshot"
         — Ou Win+Shift+S e recorta na área do card
      3. Salve como: img/og-image.png
      4. Em index.html, troque <meta property="og:image" content="img/eu.JPG" />
         por <meta property="og:image" content="img/og-image.png" />
    */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #2a2a3a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; font-family: 'Rajdhani', sans-serif;
    }
    .og-card {
      width: 1200px; height: 630px;
      background: #080810;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 70px;
      color: #e8e0ff;
    }
    /* grade animada */
    .og-card::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(180,78,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,78,255,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* glow */
    .og-card::after {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 85% 25%, rgba(180,78,255,0.35), transparent 50%),
        radial-gradient(circle at 15% 85%, rgba(0,245,255,0.18), transparent 50%);
    }
    .og-inner { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    .og-top { display: flex; justify-content: space-between; align-items: center; }
    .og-logo {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: 28px; letter-spacing: 0.15em;
    }
    .og-logo span { color: #b44eff; text-shadow: 0 0 20px rgba(180,78,255,0.9); }
    .og-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; letter-spacing: 0.2em; color: #00f5ff;
      padding: 8px 18px; border: 1px solid rgba(0,245,255,0.4);
      background: rgba(0,245,255,0.06);
      text-shadow: 0 0 10px rgba(0,245,255,0.7);
      display: flex; align-items: center; gap: 12px;
    }
    .og-status::before {
      content: ''; width: 10px; height: 10px; border-radius: 50%;
      background: #00f5ff; box-shadow: 0 0 12px #00f5ff;
    }
    .og-name {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: 130px; line-height: 1; letter-spacing: 0.02em;
      margin-bottom: 14px;
    }
    .og-name .accent { color: #b44eff; text-shadow: 0 0 40px rgba(180,78,255,0.8); }
    .og-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 26px; color: #b44eff; letter-spacing: 0.05em;
      margin-bottom: 18px;
    }
    .og-subtitle span { color: #00f5ff; }
    .og-tagline {
      font-size: 28px; font-weight: 400; color: #e8e0ff;
      max-width: 800px; line-height: 1.4;
    }
    .og-bottom {
      display: flex; gap: 14px; flex-wrap: wrap;
    }
    .og-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px; letter-spacing: 0.08em;
      padding: 8px 18px; border-radius: 4px;
      border: 1px solid #2e2e5a; color: #b44eff;
      background: rgba(180,78,255,0.08);
      text-shadow: 0 0 8px rgba(180,78,255,0.5);
    }
  </style>
</head>
<body>

  <div class="og-card" id="ogCard">
    <div class="og-inner">

      <div class="og-top">
        <div class="og-logo">RR<span>_</span></div>
        <div class="og-status">DISPONÍVEL PARA OPORTUNIDADES</div>
      </div>

      <div>
        <div class="og-name">Rodrigo <span class="accent">Ruan.</span></div>
        <div class="og-subtitle">&gt; dev_web.init() <span>// front &amp; back</span></div>
        <div class="og-tagline">
          Desenvolvedor web full-stack construindo interfaces e
          automações que funcionam de verdade.
        </div>
      </div>

      <div class="og-bottom">
        <span class="og-tag">React</span>
        <span class="og-tag">Node.js</span>
        <span class="og-tag">JavaScript</span>
        <span class="og-tag">Vite</span>
        <span class="og-tag">Supabase</span>
        <span class="og-tag">Python</span>
        <span class="og-tag">Express</span>
        <span class="og-tag">PostgreSQL</span>
      </div>

    </div>
  </div>

</body>
</html>
